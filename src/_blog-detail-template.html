<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SEO_TITLE}}</title>
  <meta name="description" content="{{SEO_DESCRIPTION}}">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body>

  <!-- @include header -->

  <section class="page-hero" style="padding-bottom: 40px;">
    <div class="container text-center">
      <div class="blog-detail-meta" style="margin-bottom: 15px;">{{DATE_LABEL}} | {{CATEGORY}}</div>
      <h1 class="hero-title" style="max-width: 800px; margin: 0 auto 20px auto; font-size: clamp(24px, 4vw, 42px); line-height: 1.25;">{{TITLE}}</h1>
      <p style="color: var(--text-light); font-size: 14px;">By {{AUTHOR}}</p>
    </div>
  </section>

  <section class="section-padding" style="background-color: var(--bg-secondary); padding-top: 0;">
    <div class="container">
      <div class="blog-detail-container">
        <div class="blog-detail-hero">
          <img src="{{COVER_IMAGE}}" alt="{{COVER_ALT}}" width="1600" height="900" decoding="async">
        </div>

        <div class="blog-detail-body">
          {{ARTICLE_BODY}}

        </div>
      </div>
    </div>
  </section>

  <!-- @include footer -->

  <script src="assets/js/main.js"></script>
</body>
</html>
