<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfume Manufacturing Guides &amp; Insights | AROMAMATRIX</title>
  <meta name="description" content="Explore practical guides for perfume brand owners covering sourcing, fragrance development, MOQ, packaging, quality, compliance and international shipping.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body>

  <!-- @include header -->

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="container text-center">
      <h1 class="hero-title" style="margin-bottom: 12px;">AROMAMATRIX Blog</h1>
      <p class="section-subtitle" style="margin-bottom: 0;">Scent Sourcing Industry Insights, Guides & Perfume Marketing Advice</p>
    </div>
  </section>

  <!-- Blog Grid Section -->
  <section class="section-padding" style="background-color: var(--bg-secondary);">
    <div class="container">
      <div class="blog-explorer" data-blog-directory>
        <div class="blog-search-row">
          <label class="blog-search-control" for="blog-search">
            <span>Search factory guides</span>
            <input id="blog-search" type="search" placeholder="Try MOQ, IFRA, bottle, cost or shipping" autocomplete="off">
          </label>
          <p id="blog-result-count" class="blog-result-count" aria-live="polite">Showing {{BLOG_POST_COUNT}} guides</p>
        </div>
        <div class="blog-filter-row" aria-label="Filter guides by category">
          <!-- @blog-filters -->
        </div>
      </div>
      <div class="blog-grid">
        <!-- @blog-posts -->
      </div>
      <div id="blog-empty" class="blog-empty" hidden>
        <h2>No matching factory guide</h2>
        <p>Try a broader term or <a href="contact.html">ask our project team</a> about your sourcing question.</p>
      </div>
    </div>
  </section>

  <!-- @include footer -->

  <!-- Main JavaScript -->
  <script src="assets/js/main.js"></script>
</body>
</html>
